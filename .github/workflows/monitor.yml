name: Emma Estate Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run monitor
        run: |
          chmod +x monitor.sh
          ./monitor.sh
          ls -lah

      - name: Commit status files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          touch status.json status.txt down_since.txt
          git add status.json status.txt down_since.txt
          git diff --cached --quiet || git commit -m "Update monitor status"
          git push
